name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Tests run on the GitHub runner first ───────────────────────────────
  test:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm ci` if you commit package-lock.json (faster, reproducible);
        # otherwise switch to `npm install`.
        run: npm ci

      - name: Run unit tests
        env:
          CI: true            # forces Jest to run once, not in watch mode
        # To TEMPORARILY let deploys through while you adapt the tests,
        # uncomment the next line (NOT recommended long-term):
        # continue-on-error: true
        run: npm test

  # ── 2. Build + deploy only after tests pass ───────────────────────────────
  deploy:
    name: Build and Deploy
    needs: test            # <-- gate: requires the `test` job to succeed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:       ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            echo "🚀 Starting Frontend deployment..."

            # Navigate to the website folder
            cd /var/www/tickety_website

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install --quiet

            echo "🏗️ Building the project..."
            npm run build

            echo "🔒 Setting permissions..."
            chown -R www-data:www-data /var/www/tickety_website/dist
            chmod -R 755 /var/www/tickety_website/dist

            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx

            sleep 2

            echo "✅ Checking Nginx status..."
            systemctl is-active nginx && echo "Nginx is running!" || echo "❌ Nginx failed!"